<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH PRO MAX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPanel">
  <h2>🔐 Accès RH</h2>
  <input id="adminId" placeholder="ID">
  <input id="adminMdP" type="password" placeholder="MDP">
  <button onclick="loginAdmin()" class="btn">Connexion</button>
</div>

<header>📊 PORTAIL RH PRO MAX</header>

<!-- STATS -->
<div id="stats"></div>

<!-- OFFRES -->
<div class="container">

<div class="card">
<h3>Mathématiques</h3>
<p>Algèbre / géométrie</p>
<button class="btn" onclick="openForm('Mathématiques')">Candidater</button>
</div>

<div class="card">
<h3>Français</h3>
<p>Littérature / grammaire</p>
<button class="btn" onclick="openForm('Français')">Candidater</button>
</div>

</div>

<!-- FORM -->
<div id="form">
<form onsubmit="send(event)">
<h3>🎯 Candidature</h3>

<input id="rp" placeholder="Nom RP" required>
<input id="exp" placeholder="Expérience" required>
<input id="dispo" placeholder="Disponibilité" required>
<input id="discord" placeholder="Discord" required>

<button class="btn" type="submit">Envoyer</button>
</form>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <h2>🧠 Panel RH</h2>
  <div id="filters">
    <button onclick="filter('ALL')">Tout</button>
    <button onclick="filter('WAIT')">🟡 Attente</button>
    <button onclick="filter('OK')">🟢 Accepté</button>
    <button onclick="filter('NO')">🔴 Refusé</button>
  </div>

  <div id="candidatures"></div>
</div>

<script src="script.js"></script>
</body>
</html>
